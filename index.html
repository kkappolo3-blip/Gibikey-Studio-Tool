    <script>
        // Check for user session
        function checkUserSession() {
            // Simulating session check, replace with actual session validation
            let userSession = sessionStorage.getItem('userSession');

            if (!userSession) {
                // Redirect to login page if session is not valid
                window.location.href = 'login-otp.html';
            } else {
                // If session is valid, you might want to load user data, etc.
                console.log('User session valid.');
            }
        }

        // Call the function on load
        window.onload = checkUserSession;
    </script>
